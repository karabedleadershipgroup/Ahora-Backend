<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AHORA — Karabed Leadership Group</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1B2A4A;
    --navy-light: #243558;
    --navy-mid: #1e3059;
    --gold: #C9A84C;
    --gold-light: #DEC06E;
    --gold-pale: rgba(201,168,76,0.12);
    --gold-border: rgba(201,168,76,0.3);
    --white: #FFFFFF;
    --white-90: rgba(255,255,255,0.9);
    --white-60: rgba(255,255,255,0.6);
    --white-30: rgba(255,255,255,0.3);
    --white-10: rgba(255,255,255,0.08);
    --white-15: rgba(255,255,255,0.13);
  }

  html, body {
    height: 100%;
    background: var(--navy);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    line-height: 1.6;
  }

  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 520px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    padding: 16px 20px 14px;
    border-bottom: 0.5px solid var(--white-15);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--navy);
  }

  .logo-block { display: flex; align-items: center; gap: 10px; }

  /* SVG leaf logo inline */
  .logo-icon { width: 32px; height: 32px; flex-shrink: 0; }

  .logo-text { display: flex; flex-direction: column; line-height: 1.15; }
  .logo-top { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.12em; color: var(--gold); text-transform: uppercase; }
  .logo-bottom { font-family: 'Cormorant Garamond', serif; font-size: 11px; font-weight: 400; letter-spacing: 0.18em; color: var(--white-60); text-transform: uppercase; }

  .timer-badge {
    font-size: 10px; font-weight: 500; letter-spacing: 0.05em;
    color: var(--gold); background: var(--gold-pale);
    border: 0.5px solid var(--gold-border);
    padding: 4px 10px; border-radius: 99px;
    opacity: 0; transition: opacity 0.3s;
    white-space: nowrap;
  }

  /* PROGRESS */
  .progress-wrap { padding: 12px 20px 6px; flex-shrink: 0; background: var(--navy); }
  .pips { display: flex; gap: 4px; }
  .pip { height: 2px; flex: 1; border-radius: 99px; background: var(--white-15); transition: background 0.35s; }
  .pip.active { background: var(--gold); }
  .pip.done { background: var(--gold-light); opacity: 0.7; }
  .step-label { font-size: 10px; color: var(--white-30); letter-spacing: 0.07em; text-transform: uppercase; margin-top: 6px; min-height: 14px; font-weight: 500; }

  /* MESSAGES */
  .messages {
    flex: 1; overflow-y: auto; padding: 16px 20px 8px;
    display: flex; flex-direction: column; gap: 10px;
    scroll-behavior: smooth;
    background: var(--navy);
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--white-15); border-radius: 99px; }

  .msg { display: flex; gap: 10px; animation: fadeUp 0.2s ease both; }
  .msg.user { flex-direction: row-reverse; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  .av {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--gold-pale); border: 0.5px solid var(--gold-border);
    font-size: 10px; font-weight: 600; letter-spacing: 0.05em;
    color: var(--gold);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 2px;
  }

  .msg.user .av {
    background: var(--white-10);
    border-color: var(--white-15);
    color: var(--white-60);
    font-size: 12px;
  }

  .bubble {
    max-width: 84%; padding: 10px 14px; border-radius: 16px;
    font-size: 13.5px; line-height: 1.75;
  }

  .msg.ai .bubble {
    background: var(--navy-light);
    border: 0.5px solid var(--white-15);
    border-bottom-left-radius: 4px;
    color: var(--white-90);
  }

  .msg.user .bubble {
    background: var(--gold);
    color: var(--navy);
    border-bottom-right-radius: 4px;
    font-weight: 500;
  }

  .step-badge {
    display: inline-block; font-size: 9px; font-weight: 600;
    letter-spacing: 0.09em; text-transform: uppercase;
    background: var(--gold-pale); color: var(--gold);
    border: 0.5px solid var(--gold-border);
    padding: 2px 8px; border-radius: 99px; margin-bottom: 7px;
  }

  /* TYPING */
  .typing { display: flex; gap: 10px; align-items: flex-end; }
  .t-dots {
    background: var(--navy-light); border: 0.5px solid var(--white-15);
    padding: 11px 14px; border-radius: 16px; border-bottom-left-radius: 4px;
    display: flex; gap: 5px; align-items: center;
  }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); animation: bop 1.2s infinite; opacity: 0.6; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bop { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }

  /* INPUT */
  .input-area {
    padding: 10px 16px 20px;
    border-top: 0.5px solid var(--white-15);
    flex-shrink: 0;
    background: var(--navy);
  }

  .input-row { display: flex; gap: 8px; align-items: flex-end; }

  textarea.ibox {
    flex: 1; background: var(--navy-light);
    border: 0.5px solid var(--white-15);
    border-radius: 20px; padding: 10px 16px;
    font-family: 'Montserrat', sans-serif; font-size: 13px;
    color: var(--white); resize: none; outline: none;
    min-height: 42px; max-height: 120px; line-height: 1.5;
    transition: border-color 0.15s;
  }
  textarea.ibox::placeholder { color: var(--white-30); }
  textarea.ibox:focus { border-color: var(--gold-border); }

  .send-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--gold); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s, transform 0.1s;
  }
  .send-btn:hover { background: var(--gold-light); }
  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { background: var(--white-15); cursor: default; }
  .send-btn svg { width: 16px; height: 16px; }

  /* SCRIPT CARD */
  .script-card {
    background: var(--navy-light);
    border: 0.5px solid var(--gold-border);
    border-left: 3px solid var(--gold);
    border-radius: 12px; padding: 14px 16px;
    max-width: 88%; font-size: 13.5px;
  }
  .script-lbl { font-size: 9px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .script-lines { font-style: italic; color: var(--white-90); line-height: 1.8; margin-bottom: 8px; }
  .script-tip { font-size: 11.5px; color: var(--white-60); line-height: 1.5; }

  /* SUMMARY */
  .sum-card {
    background: var(--navy-light);
    border: 0.5px solid var(--white-15);
    border-radius: 14px; padding: 16px; max-width: 90%;
  }
  .sum-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; color: var(--gold); margin-bottom: 12px; letter-spacing: 0.02em; }
  .sum-row { display: flex; gap: 10px; margin-bottom: 9px; font-size: 12.5px; color: var(--white-60); line-height: 1.55; }
  .sum-dot { width: 20px; height: 20px; border-radius: 50%; background: var(--gold-pale); border: 0.5px solid var(--gold-border); color: var(--gold); font-size: 9px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }

  .restart-btn {
    width: 100%; margin-top: 14px; padding: 10px;
    border-radius: 99px; border: 0.5px solid var(--gold-border);
    background: transparent; color: var(--gold);
    font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer; transition: background 0.15s;
  }
  .restart-btn:hover { background: var(--gold-pale); }

  /* DIVIDER */
  .quote-line {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px; font-style: italic;
    color: var(--white-30); text-align: center;
    padding: 8px 20px 0;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div class="shell">

  <div class="header">
    <div class="logo-block">
      <!-- Leaf SVG icon matching KLG brand -->
      <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 28V14" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M16 14C16 14 10 10 9 5C9 5 14 4 16 10" fill="#C9A84C" opacity="0.7"/>
        <path d="M16 14C16 14 22 10 23 5C23 5 18 4 16 10" fill="#C9A84C"/>
        <path d="M16 19C16 19 11 16 10 12C10 12 14 11 16 16" fill="#C9A84C" opacity="0.5"/>
        <path d="M16 19C16 19 21 16 22 12C22 12 18 11 16 16" fill="#C9A84C" opacity="0.8"/>
        <line x1="12" y1="28" x2="20" y2="28" stroke="#C9A84C" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
      </svg>
      <div class="logo-text">
        <span class="logo-top">AHORA</span>
        <span class="logo-bottom">Karabed Leadership Group</span>
      </div>
    </div>
    <div class="timer-badge" id="timer-badge">48-hr window</div>
  </div>

  <div class="progress-wrap">
    <div class="pips">
      <div class="pip" data-i="0"></div>
      <div class="pip" data-i="1"></div>
      <div class="pip" data-i="2"></div>
      <div class="pip" data-i="3"></div>
      <div class="pip" data-i="4"></div>
    </div>
    <div class="step-label" id="step-label"></div>
  </div>

  <div class="messages" id="messages">
    <div id="scroll-anchor"></div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea class="ibox" id="input" placeholder="Type here..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 16 16" fill="none" stroke="#1B2A4A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 8h12M9 3l5 5-5 5"/>
        </svg>
      </button>
    </div>
    <div class="quote-line">"AHORA only works if you use it." — Dr. Isa Karabed</div>
  </div>

</div>

<script>
const STEPS = [
  { letter:"A", label:"Acknowledge" },
  { letter:"H", label:"Hold accountability" },
  { letter:"O", label:"Open possibilities" },
  { letter:"R", label:"Request repair" },
  { letter:"A", label:"Act and align" }
];

const SYSTEM = You are a conflict resolution prep coach using the AHORA framework by Dr. Isa Karabed. This is NOT a therapy session. You are helping the impacted person prepare the exact words they will say when they initiate the conversation. Be brief, direct, and practical. Every response is 2-3 sentences max. One question at a time. No affirmations. No therapy-speak.

THE AHORA STEPS:

STEP 1 - A: Acknowledge
Help them build two sentences they will actually say out loud:
1. A sentence naming that they value the relationship or the person.
2. A sentence naming the specific behavior and its impact - not a feeling, what happened and what it cost them.
Ask short direct questions. What did they do? What did that cost you? How would you say that in one sentence? Push until both sentences are clear and real. Do not move on until they have actual words.

STEP 2 - H: Hold accountability
This is a reminder, not a conversation. Tell them: after they say their two sentences, they stop and wait. They watch to see if the other person takes accountability. If yes, skip straight to Act and Align. If the other person gets defensive or minimizes, move to Open Possibilities. Ask: do you expect them to take accountability or push back?

STEP 3 - O: Open possibilities
Help them prepare one open question to invite the other person into a solution. Example: What do you think would help us move forward? Help them pick or write their own version. One sentence, open, non-leading.

STEP 4 - R: Request repair
Help them prepare one specific behavioral request. Not a feeling. A concrete ask: Going forward, I need [specific behavior]. Get them to name exactly what they need the other person to do differently.

STEP 5 - A: Act and Align
Always include this step no matter what - even if they expect an apology. This closes the conversation with a clear shared agreement. Help them prepare one sentence: So we are agreeing that going forward we will [behavior]. Does that work?

RULES:
- 2-3 sentences per response. Hard limit.
- One question per message.
- No preamble, no affirmations, no therapy language.
- You are building their script - push toward actual words they will say.
- When a step is done, start next message with [STEP:X]. Do not name the step in prose.
- Always end with Act and Align.
- When all steps done, output [STEP:DONE] then their full script as:
SCRIPT:
"[All their prepared sentences in order]"
Deliver this calmly and directly. Pause after your first two sentences and wait.;

let history = [], busy = false;

function setProgress(s) {
  document.querySelectorAll(".pip").forEach((p,i) => {
    p.classList.remove("active","done");
    if (i < s) p.classList.add("done");
    else if (i === s) p.classList.add("active");
  });
  const lbl = document.getElementById("step-label");
  const badge = document.getElementById("timer-badge");
  if (s < 5) {
    lbl.textContent = "Step " + (s+1) + " of 5 — " + STEPS[s].label;
    badge.style.opacity = "1";
  } else {
    lbl.textContent = "";
    badge.style.opacity = "0";
  }
}

function scrollDown() {
  setTimeout(() => { const m = document.getElementById("messages"); m.scrollTop = m.scrollHeight; }, 40);
}

function addMsg(role, text, stepIdx) {
  const msgs = document.getElementById("messages");
  const anchor = document.getElementById("scroll-anchor");
  const wrap = document.createElement("div");
  wrap.className = "msg " + role;
  const av = document.createElement("div");
  av.className = "av";
  av.textContent = role === "ai" ? "KLG" : "↑";
  const bub = document.createElement("div");
  bub.className = "bubble";
  if (role === "ai" && stepIdx !== undefined) {
    const badge = document.createElement("div");
    badge.className = "step-badge";
    badge.textContent = STEPS[stepIdx].letter + " — " + STEPS[stepIdx].label;
    bub.appendChild(badge);
  }
  const p = document.createElement("div");
  p.textContent = text;
  bub.appendChild(p);
  wrap.appendChild(av);
  wrap.appendChild(bub);
  msgs.insertBefore(wrap, anchor);
  scrollDown();
}

function addScriptCard(lines, tip) {
  const msgs = document.getElementById("messages");
  const anchor = document.getElementById("scroll-anchor");
  const wrap = document.createElement("div");
  wrap.className = "msg ai";
  const av = document.createElement("div");
  av.className = "av";
  av.textContent = "KLG";
  const card = document.createElement("div");
  card.className = "script-card";
  card.innerHTML = '<div class="script-lbl">Your opening script</div><div class="script-lines">' + lines + '</div><div class="script-tip">' + tip + '</div>';
  wrap.appendChild(av);
  wrap.appendChild(card);
  msgs.insertBefore(wrap, anchor);
  scrollDown();
}

function addSummaryCard(rows) {
  const msgs = document.getElementById("messages");
  const anchor = document.getElementById("scroll-anchor");
  const wrap = document.createElement("div");
  wrap.className = "msg ai";
  const av = document.createElement("div");
  av.className = "av";
  av.textContent = "KLG";
  const card = document.createElement("div");
  card.className = "sum-card";
  const title = document.createElement("div");
  title.className = "sum-title";
  title.textContent = "What you worked through";
  card.appendChild(title);
  rows.forEach(r => {
    const row = document.createElement("div");
    row.className = "sum-row";
    row.innerHTML = '<div class="sum-dot">' + r.letter + '</div><div><strong style="color:rgba(255,255,255,0.85)">' + r.step + '</strong><br>' + r.text + '</div>';
    card.appendChild(row);
  });
  const btn = document.createElement("button");
  btn.className = "restart-btn";
  btn.textContent = "Start a new session";
  btn.onclick = restart;
  card.appendChild(btn);
  wrap.appendChild(av);
  wrap.appendChild(card);
  msgs.insertBefore(wrap, anchor);
  scrollDown();
}

function showTyping() {
  const msgs = document.getElementById("messages");
  const anchor = document.getElementById("scroll-anchor");
  const el = document.createElement("div");
  el.className = "typing";
  el.id = "typing";
  el.innerHTML = '<div class="av">KLG</div><div class="t-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  msgs.insertBefore(el, anchor);
  scrollDown();
}

function hideTyping() {
  const el = document.getElementById("typing");
  if (el) el.remove();
}

function parseDone(text) {
  const stepMeta = [
    {letter:"A", step:"Acknowledge"},
    {letter:"H", step:"Hold accountability"},
    {letter:"O", step:"Open possibilities"},
    {letter:"R", step:"Request repair"},
    {letter:"A", step:"Act and align"}
  ];
  const rows = [];
  const lines = text.split("\n");
  let scriptContent = [];
  let inScript = false;

  lines.forEach(line => {
    const s = line.trim();
    if (s.startsWith("SCRIPT:")) { inScript = true; return; }
    if (inScript) { scriptContent.push(s); return; }
    const m = s.match(/^[AHORAahora]\s*[—–\-]\s*[^:]+:\s*(.+)/);
    if (m && rows.length < 5) {
      rows.push({ letter: stepMeta[rows.length].letter, step: stepMeta[rows.length].step, text: m[1] });
    }
  });

  const scriptBlock = scriptContent.join("\n");
  const qm = scriptBlock.match(/"([^"]+)"/s);
  let scriptLines = "", scriptTip = "";
  if (qm) {
    scriptLines = qm[1].replace(/\n/g, "<br>");
    scriptTip = scriptBlock.replace(qm[0], "").trim();
  } else {
    scriptLines = scriptBlock.replace(/\n/g, "<br>");
  }

  if (rows.length) addSummaryCard(rows);
  if (scriptLines) addScriptCard(scriptLines, scriptTip);

  document.getElementById("input").disabled = true;
  document.getElementById("send-btn").disabled = true;
  setProgress(5);
}

async function callAI(userText) {
  if (userText) history.push({ role:"user", content:userText });
  const res = await fetch("https://ahora-backend.vercel.app/api/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system:SYSTEM, messages:history })
  });
  const data = await res.json();
  const raw = (data.content||[]).map(b=>b.text||"").join("");
  history.push({ role:"assistant", content:raw });
  return raw;
}

function processRaw(raw) {
  const m = raw.match(/\[STEP:(\d+|DONE)\]/);
  const text = raw.replace(/\[STEP:(\d+|DONE)\]/g,"").trim();
  if (m) {
    if (m[1] === "DONE") { parseDone(text); return; }
    const ns = parseInt(m[1]) - 1;
    setProgress(ns);
    addMsg("ai", text, ns);
  } else {
    addMsg("ai", text);
  }
}

async function sendMessage() {
  if (busy) return;
  const inp = document.getElementById("input");
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = "";
  inp.style.height = "";
  addMsg("user", txt);
  busy = true;
  document.getElementById("send-btn").disabled = true;
  showTyping();
  try {
    const raw = await callAI(txt);
    hideTyping();
    processRaw(raw);
  } catch(e) {
    hideTyping();
    addMsg("ai","Something went wrong — please try again.");
  }
  busy = false;
  document.getElementById("send-btn").disabled = false;
  inp.focus();
}

function restart() {
  history = [];
  document.getElementById("messages").innerHTML = '<div id="scroll-anchor"></div>';
  document.getElementById("input").disabled = false;
  document.getElementById("send-btn").disabled = false;
  init();
}

async function init() {
  setProgress(0);
  addMsg("ai", "Welcome. This space is here to help you work through a conflict so you can address it with clarity and confidence — ideally within 48 hours. Is there a conflict or difficult situation you are ready to work through today?", 0);
}
const inp = document.getElementById("input");
inp.addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight,120) + "px";
});
inp.addEventListener("keydown", function(e) {
  if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

init();
</script>
</body>
</html>
